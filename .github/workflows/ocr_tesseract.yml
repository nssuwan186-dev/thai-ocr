name: 🇹🇭 Thai Hotel OCR - Tesseract (Free & Stable)

on:
  workflow_dispatch:
    inputs:
      image_folder:
        description: 'Folder in repo containing images'
        required: false
        default: 'images'
  push:
    paths:
      - 'images/**'
      - 'drive-downloads/**'

permissions:
  contents: write

jobs:
  ocr:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: 📥 Checkout repository
        uses: actions/checkout@v5

      - name: 📦 Install Tesseract OCR
        run: |
          sudo apt-get update
          sudo apt-get install -y tesseract-ocr tesseract-ocr-tha
          pip install pytesseract pillow tqdm

      - name: 🔍 Run Thai OCR with Tesseract
        env:
          IMAGE_FOLDER: ${{ github.event.inputs.image_folder || 'images' }}
        run: |
          python scripts/ocr_tesseract.py \
            --folder "$IMAGE_FOLDER" \
            --output results/ocr_result.json

      - name: 📊 Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "📊 OCR: update results [skip ci]"
          git push || echo "No changes to push"
