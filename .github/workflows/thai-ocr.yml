name: 🇹🇭 Thai OCR with Deep Learning

on:
  push:
    paths:
      - 'images/**'
      - 'uploads/**'
      - 'drive-downloads/**'
  workflow_dispatch:
    inputs:
      model:
        description: 'OCR Model to use'
        required: false
        default: 'typhoon'
        type: choice
        options:
          - typhoon
          - paddleocr
          - easyocr

permissions:
  contents: write
  actions: read

jobs:
  thai-ocr:
    runs-on: ubuntu-latest

    steps:
    - name: 📥 Checkout Repository
      uses: actions/checkout@v5
      with:
        fetch-depth: 0
        token: ${{ secrets.GITHUB_TOKEN }}

    - name: 🐍 Setup Python
      uses: actions/setup-python@v6
      with:
        python-version: '3.10'

    - name: 📦 Install Typhoon OCR (Best for Thai)
      if: github.event.inputs.model == 'typhoon' || github.event.inputs.model == ''
      run: |
        echo "Installing Typhoon OCR - Best for Thai Language..."
        pip install typhoon-ocr transformers torch pillow tqdm
        echo "✅ Typhoon OCR installed"

    - name: 📦 Install PaddleOCR
      if: github.event.inputs.model == 'paddleocr'
      run: |
        echo "Installing PaddleOCR..."
        pip install paddlepaddle paddleocr
        pip install pillow numpy pandas tqdm

    - name: 📦 Install EasyOCR
      if: github.event.inputs.model == 'easyocr'
      run: |
        echo "Installing EasyOCR..."
        pip install easyocr
        pip install pillow numpy pandas tqdm

    - name: 🔍 Run Thai OCR with Typhoon
      if: github.event.inputs.model == 'typhoon' || github.event.inputs.model == ''
      run: |
        python .github/workflows/run-typhoon-ocr.py \
          --input-dir images \
          --output-dir results \
          --lang th

    - name: 🔍 Run Thai OCR with PaddleOCR
      if: github.event.inputs.model == 'paddleocr'
      run: |
        python .github/workflows/run-thai-ocr.py \
          --input-dir images \
          --output-dir results \
          --model paddleocr \
          --lang th

    - name: 🔍 Run Thai OCR with EasyOCR
      if: github.event.inputs.model == 'easyocr'
      run: |
        python .github/workflows/run-thai-ocr.py \
          --input-dir images \
          --output-dir results \
          --model easyocr \
          --lang th

    - name: 📊 Commit Results
      run: |
        git config --local user.email "action@github.com"
        git config --local user.name "GitHub Action - Thai OCR"
        git add results/ || true
        if ! git diff --staged --quiet; then
          git commit -m "📊 OCR Results: $(date +%Y-%m-%d-%H-%M)"
          git push origin HEAD --force || echo "Push failed but continuing"
        else
          echo "No changes to commit"
        fi

    - name: 📤 Upload Results
      uses: actions/upload-artifact@v5
      with:
        name: ocr-results-${{ github.run_id }}
        path: |
          results/
        retention-days: 30

    - name: 📈 Summary
      run: |
        echo "## 📊 OCR Summary" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Model Used" >> $GITHUB_STEP_SUMMARY
        echo "- Model: ${{ github.event.inputs.model || 'typhoon' }}" >> $GITHUB_STEP_SUMMARY
        echo "- Language: Thai" >> $GITHUB_STEP_SUMMARY
        echo "" >> $GITHUB_STEP_SUMMARY
        echo "### Results" >> $GITHUB_STEP_SUMMARY
        if [ -f results/summary.json ]; then
          cat results/summary.json >> $GITHUB_STEP_SUMMARY
        else
          echo "No summary available" >> $GITHUB_STEP_SUMMARY
        fi
