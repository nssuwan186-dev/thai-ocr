name: Thai Hotel Registration OCR

on:
  workflow_dispatch:
    inputs:
      image_folder:
        description: 'Folder in repo containing images (default: images)'
        required: false
        default: 'images'
  push:
    paths:
      - 'images/**'

permissions:
  contents: write

jobs:
  ocr:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic pillow

      - name: Run Thai OCR
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          IMAGE_FOLDER: ${{ github.event.inputs.image_folder || 'images' }}
        run: |
          python scripts/ocr_hotel_form.py \
            --folder "$IMAGE_FOLDER" \
            --output results/ocr_result.json

      - name: Commit results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add results/
          git diff --staged --quiet || git commit -m "ocr: update results [skip ci]"
          git push
