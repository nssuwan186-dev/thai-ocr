name: CI Release

# Runs when a tag is pushed from outside Actions (e.g. local `git push --tags`).
# Tags created by another workflow with secrets.GITHUB_TOKEN do not trigger this
# workflow; see ci-tag.yaml.yml for automated releases after version bumps.
on:
  push:
    tags:
      - "**"

permissions:
  contents: write

jobs:
  goreleaser:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
